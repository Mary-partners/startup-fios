# ============================================================
# Netlify Configuration — Startup Financial Intelligence OS
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

# Use the Next.js Runtime for SSR + API routes
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Environment variables (set these in Netlify Dashboard → Site settings → Environment variables)
# DATABASE_URL              = "postgresql://..."
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_..."
# CLERK_SECRET_KEY          = "sk_..."
# CLERK_WEBHOOK_SECRET      = "whsec_..."
# STRIPE_SECRET_KEY         = "sk_test_..."
# STRIPE_WEBHOOK_SECRET     = "whsec_..."
# NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_..."
# OPENAI_API_KEY            = "sk-..."
# NEXT_PUBLIC_APP_URL       = "https://your-site.netlify.app"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirect www to non-www (when custom domain is set)
[[redirects]]
  from = "https://www.yourdomain.com/*"
  to = "https://yourdomain.com/:splat"
  status = 301
  force = true
